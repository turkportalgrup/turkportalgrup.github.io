<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Box Player</title>
    <!-- Video.js Player -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        
        /* TV Konteyneri */
        .tv-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #000;
        }
        
        /* Video Player Konteyneri */
        #video-container {
            width: 100%;
            height: 100%;
            background-color: #000;
        }
        
        /* Video.js Player Stilleri */
        .video-js {
            width: 100% !important;
            height: 100% !important;
        }
        
        .vjs-control-bar {
            background-color: rgba(0, 0, 0, 0.7) !important;
        }
        
        /* Kanallar Menüsü (Gizli) */
        .channels-menu {
            position: absolute;
            right: -250px; /* Başlangıçta gizli */
            top: 0;
            width: 250px; /* Daha dar */
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            border-left: 2px solid #333;
            z-index: 1000;
            transition: right 0.3s ease;
            overflow-y: auto;
            padding: 10px;
        }
        
        .channels-menu.open {
            right: 0;
        }
        
        /* Menü Başlığı */
        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #444;
        }
        
        .menu-title {
            font-size: 18px;
            color: #fff;
            font-weight: bold;
        }
        
        /* Kapat Butonu */
        .close-menu {
            background: #555;
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Kanal Listesi */
        .channel-list {
            list-style: none;
        }
        
        .channel-item {
            display: flex;
            align-items: center;
            padding: 8px;
            margin-bottom: 5px;
            background-color: #222;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            height: 60px; /* Sabit yükseklik */
        }
        
        .channel-item:hover,
        .channel-item:focus {
            background-color: #333;
            border-color: #4CAF50;
        }
        
        .channel-item.active {
            background-color: #1a3c1f;
            border-color: #4CAF50;
        }
        
        .channel-logo {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            margin-right: 10px;
            object-fit: contain;
            background-color: #111;
            padding: 3px;
            flex-shrink: 0;
        }
        
        .channel-info {
            flex: 1;
            min-width: 0; /* Taşmayı engelle */
        }
        
        .channel-name {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .channel-url {
            font-size: 10px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* Şu anki Kanal Bilgisi */
        .current-channel-info {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            z-index: 50;
            border: 2px solid #444;
            max-width: 300px;
        }
        
        .current-channel-logo {
            width: 35px;
            height: 35px;
            border-radius: 5px;
            margin-right: 10px;
            object-fit: contain;
            background-color: #111;
            padding: 2px;
            flex-shrink: 0;
        }
        
        .current-channel-name {
            font-size: 16px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* Kontroller */
        .controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .tv-container:hover .controls {
            opacity: 1;
        }
        
        .control-button {
            width: 50px;
            height: 50px;
            background-color: rgba(0, 0, 0, 0.7);
            border: 2px solid #555;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .control-button:hover {
            background-color: rgba(76, 175, 80, 0.8);
            border-color: #4CAF50;
        }
        
        /* Scrollbar Stili */
        .channels-menu::-webkit-scrollbar {
            width: 6px;
        }
        
        .channels-menu::-webkit-scrollbar-track {
            background: #222;
        }
        
        .channels-menu::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 3px;
        }
        
        .channels-menu::-webkit-scrollbar-thumb:hover {
            background: #777;
        }
        
        /* TV Box için optimizasyonlar */
        .channel-item:focus {
            outline: 3px solid #4CAF50;
            outline-offset: 2px;
        }
        
        /* Fokus yönetimi */
        *:focus {
            outline: 2px solid #4CAF50;
        }
        
        /* Küçük ekranlar için */
        @media (max-width: 768px) {
            .channels-menu {
                width: 220px;
                right: -220px;
            }
            
            .channel-item {
                height: 55px;
            }
            
            .channel-logo {
                width: 35px;
                height: 35px;
            }
            
            .channel-name {
                font-size: 13px;
            }
        }
        
        /* Tam ekran modu */
        :fullscreen #video-container {
            width: 100%;
            height: 100%;
        }
        
        /* Yükleme göstergesi */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            color: #4CAF50;
            z-index: 10;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            border-radius: 8px;
            display: none;
        }
        
        .loading.show {
            display: block;
        }
        
        /* Video.js kontrol çubuğunu özelleştirme */
        .vjs-big-play-button {
            background-color: rgba(76, 175, 80, 0.7) !important;
            border-color: #4CAF50 !important;
        }
        
        .vjs-play-progress {
            background-color: #4CAF50 !important;
        }
    </style>
</head>
<body>
    <div class="tv-container">
        <!-- Video Player Konteyneri -->
        <div id="video-container">
            <video
                id="video-player"
                class="video-js vjs-default-skin vjs-big-play-centered"
                controls
                preload="auto"
                playsinline
                data-setup='{}'>
                <p class="vjs-no-js">
                    Tarayıcınız bu video formatını desteklemiyor.
                </p>
            </video>
        </div>
        
        <!-- Şu anki Kanal Bilgisi -->
        <div class="current-channel-info">
            <img id="current-channel-logo" class="current-channel-logo" src="https://via.placeholder.com/35x35/111/fff?text=TV" alt="Kanal">
            <div id="current-channel-name" class="current-channel-name">Kanal Seçin</div>
        </div>
        
        <!-- Yükleme Göstergesi -->
        <div class="loading" id="loading">Yükleniyor...</div>
        
        <!-- Kontroller -->
        <div class="controls">
            <button class="control-button" id="fullscreen-button" title="Tam Ekran (F)">
                ⛶
            </button>
            <button class="control-button" id="volume-up-button" title="Ses Aç (+)">
                🔊
            </button>
            <button class="control-button" id="volume-down-button" title="Ses Kapat (-)">
                🔈
            </button>
        </div>
        
        <!-- Kanallar Menüsü -->
        <div class="channels-menu" id="channels-menu">
            <div class="menu-header">
                <div class="menu-title">KANALLAR</div>
                <button class="close-menu" id="close-menu" title="Kapat (ESC)">×</button>
            </div>
            
            <!-- Kanallar Listesi -->
            <ul class="channel-list" id="channel-list">
                <!-- Kanallar buraya JavaScript ile eklenecek -->
            </ul>
        </div>
    </div>

        // DOM Elementleri
        const channelsMenu = document.getElementById('channels-menu');
        const channelList = document.getElementById('channel-list');
        const closeMenu = document.getElementById('close-menu');
        const currentChannelLogo = document.getElementById('current-channel-logo');
        const currentChannelName = document.getElementById('current-channel-name');
        const loadingIndicator = document.getElementById('loading');
        const fullscreenButton = document.getElementById('fullscreen-button');
        const volumeUpButton = document.getElementById('volume-up-button');
        const volumeDownButton = document.getElementById('volume-down-button');

        // Değişkenler
        let channels = [];
        let currentChannel = null;
        let menuOpen = false;
        let selectedChannelIndex = 0;
        let player = null;

        // M3U verisini parse et
        function parseM3U(data) {
            const lines = data.split('\n');
            const channels = [];
            let currentChannel = {};
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                if (line.startsWith('#EXTINF:')) {
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    const nameMatch = line.match(/,(.+)$/);
                    
                    currentChannel = {
                        logo: logoMatch ? logoMatch[1] : '',
                        name: nameMatch ? nameMatch[1].trim() : 'Bilinmeyen Kanal',
                        url: ''
                    };
                } else if (line && !line.startsWith('#') && currentChannel.name) {
                    currentChannel.url = line;
                    channels.push({...currentChannel});
                    currentChannel = {};
                }
            }
            
            return channels;
        }

        // Kanalları render et
        function renderChannels() {
            channelList.innerHTML = '';
            
            channels.forEach((channel, index) => {
                const channelItem = document.createElement('li');
                channelItem.className = 'channel-item';
                channelItem.tabIndex = 0;
                channelItem.dataset.index = index;
                
                const logoUrl = channel.logo || 'https://via.placeholder.com/40x40/111/fff?text=TV';
                
                channelItem.innerHTML = `
                    <img class="channel-logo" src="${logoUrl}" alt="${channel.name}" 
                         onerror="this.onerror=null; this.src='https://via.placeholder.com/40x40/111/fff?text=TV'">
                    <div class="channel-info">
                        <div class="channel-name">${channel.name}</div>
                        <div class="channel-url">${getDomain(channel.url)}</div>
                    </div>
                `;
                
                channelItem.addEventListener('click', () => {
                    playChannel(channel);
                    closeMenuFunc();
                });
                
                channelList.appendChild(channelItem);
            });
        }

        // URL'den domain al
        function getDomain(url) {
            try {
                const domain = new URL(url).hostname;
                return domain.length > 20 ? domain.substring(0, 20) + '...' : domain;
            } catch {
                return url.length > 20 ? url.substring(0, 20) + '...' : url;
            }
        }

        // Kanal oynat
        function playChannel(channel) {
            showLoading();
            
            currentChannel = channel;
            selectedChannelIndex = channels.findIndex(c => c.name === channel.name);
            
            // Video.js player'ı güncelle
            if (player) {
                player.src({
                    src: channel.url,
                    type: 'application/x-mpegURL'
                });
                
                player.play();
            }
            
            // Görsel bilgileri güncelle
            const logoUrl = channel.logo || 'https://via.placeholder.com/35x35/111/fff?text=TV';
            currentChannelLogo.src = logoUrl;
            currentChannelLogo.onerror = function() {
                this.src = 'https://via.placeholder.com/35x35/111/fff?text=TV';
            };
            
            currentChannelName.textContent = channel.name;
            
            // Aktif kanalı işaretle
            document.querySelectorAll('.channel-item').forEach(item => {
                item.classList.remove('active');
            });
            
            const activeItem = document.querySelector(`.channel-item[data-index="${selectedChannelIndex}"]`);
            if (activeItem) {
                activeItem.classList.add('active');
            }
        }

        // Menüyü aç
        function openMenu() {
            channelsMenu.classList.add('open');
            menuOpen = true;
            
            // Seçili kanala odaklan
            setTimeout(() => {
                const activeItem = document.querySelector(`.channel-item[data-index="${selectedChannelIndex}"]`);
                if (activeItem) {
                    activeItem.focus();
                } else if (channelList.firstChild) {
                    channelList.firstChild.focus();
                }
            }, 100);
        }

        // Menüyü kapat
        function closeMenuFunc() {
            channelsMenu.classList.remove('open');
            menuOpen = false;
        }

        // Menü aç/kapa
        function toggleMenu() {
            if (menuOpen) {
                closeMenuFunc();
            } else {
                openMenu();
            }
        }

        // Yükleme göster
        function showLoading() {
            loadingIndicator.classList.add('show');
        }

        // Yükleme gizle
        function hideLoading() {
            loadingIndicator.classList.remove('show');
        }

        // Tam ekran yap
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Tam ekran hatası: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // Ses kontrolü
        function increaseVolume() {
            if (player) {
                player.volume(Math.min(player.volume() + 0.1, 1));
            }
        }

        function decreaseVolume() {
            if (player) {
                player.volume(Math.max(player.volume() - 0.1, 0));
            }
        }

        // Kanallar arasında gezin
        function navigateChannels(direction) {
            if (!menuOpen) {
                openMenu();
                return;
            }
            
            if (direction === 'up') {
                selectedChannelIndex = selectedChannelIndex > 0 ? selectedChannelIndex - 1 : channels.length - 1;
            } else if (direction === 'down') {
                selectedChannelIndex = selectedChannelIndex < channels.length - 1 ? selectedChannelIndex + 1 : 0;
            }
            
            // Seçili kanala odaklan ve görünür yap
            const channelItem = document.querySelector(`.channel-item[data-index="${selectedChannelIndex}"]`);
            if (channelItem) {
                channelItem.focus();
                channelItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // Seçili kanalı oynat
        function playSelectedChannel() {
            if (menuOpen && channels[selectedChannelIndex]) {
                playChannel(channels[selectedChannelIndex]);
                closeMenuFunc();
            }
        }

        // TV Box Klavye Kontrolleri
        document.addEventListener('keydown', (e) => {
            // Sağ ok tuşu ile menü aç/kapat
            if (e.key === 'ArrowRight') {
                toggleMenu();
                e.preventDefault();
            }
            
            // Sol ok tuşu ile menü kapat
            if (e.key === 'ArrowLeft' && menuOpen) {
                closeMenuFunc();
                e.preventDefault();
            }
            
            // Yukarı/Aşağı ok tuşları ile kanallar arasında gezin
            if (menuOpen && (e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
                navigateChannels(e.key === 'ArrowUp' ? 'up' : 'down');
                e.preventDefault();
            }
            
            // Enter ile kanal seç
            if (menuOpen && e.key === 'Enter') {
                playSelectedChannel();
                e.preventDefault();
            }
            
            // ESC ile menü kapat
            if (e.key === 'Escape' && menuOpen) {
                closeMenuFunc();
                e.preventDefault();
            }
            
            // Tam ekran (F)
            if (e.key === 'f' || e.key === 'F') {
                toggleFullscreen();
                e.preventDefault();
            }
            
            // Ses kontrolü (+/-)
            if (e.key === '+' || e.key === 'VolumeUp') {
                increaseVolume();
                e.preventDefault();
            }
            
            if (e.key === '-' || e.key === 'VolumeDown') {
                decreaseVolume();
                e.preventDefault();
            }
            
            // Space veya 'p' ile oynat/duraklat
            if (e.key === ' ' || e.key === 'p' || e.key === 'P') {
                if (player) {
                    if (player.paused()) {
                        player.play();
                    } else {
                        player.pause();
                    }
                }
                e.preventDefault();
            }
            
            // 'm' ile ses aç/kapa
            if (e.key === 'm' || e.key === 'M') {
                if (player) {
                    player.muted(!player.muted());
                }
                e.preventDefault();
            }
        });

        // Başlangıç işlemleri
        function init() {
            // M3U verisini parse et
            channels = parseM3U(m3uData);
            
            // Video.js player'ı başlat
            player = videojs('video-player', {
                controls: true,
                autoplay: false,
                preload: 'auto',
                fluid: true,
                liveui: true,
                playbackRates: [0.5, 1, 1.5, 2],
                controlBar: {
                    children: [
                        'playToggle',
                        'volumePanel',
                        'currentTimeDisplay',
                        'timeDivider',
                        'durationDisplay',
                        'progressControl',
                        'liveDisplay',
                        'remainingTimeDisplay',
                        'customControlSpacer',
                        'playbackRateMenuButton',
                        'chaptersButton',
                        'descriptionsButton',
                        'subsCapsButton',
                        'audioTrackButton',
                        'fullscreenToggle'
                    ]
                }
            });
            
            // Player olaylarını dinle
            player.on('waiting', showLoading);
            player.on('playing', hideLoading);
            player.on('error', hideLoading);
            
            // Kanalları render et
            renderChannels();
            
            // Event listener'ları ekle
            closeMenu.addEventListener('click', closeMenuFunc);
            fullscreenButton.addEventListener('click', toggleFullscreen);
            volumeUpButton.addEventListener('click', increaseVolume);
            volumeDownButton.addEventListener('click', decreaseVolume);
            
            // TRT 1'i varsayılan olarak oynat
            const trt1 = channels.find(ch => ch.name.includes('TRT 1') && !ch.name.includes('FURKAN'));
            if (trt1) {
                setTimeout(() => playChannel(trt1), 1000);
            }
            
            // Player'a odaklan
            player.el().focus();
        }

        // Sayfa yüklendiğinde başlat
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
