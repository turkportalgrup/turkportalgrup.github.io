<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Box Player</title>
    <!-- HLS.js Player -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Roboto', Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        
        /* Ana Konteyner - Ekranı ikiye bölecek */
        .split-container {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        /* Sol Kısım - Kanallar Listesi (30%) */
        .channels-sidebar {
            width: 30%;
            max-width: 350px;
            min-width: 280px;
            background-color: #111;
            border-right: 2px solid #222;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }
        
        /* Sağ Kısım - Video Player (70%) */
        .player-section {
            flex: 1;
            background-color: #000;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Player Konteyneri */
        #player-container {
            flex: 1;
            background-color: #000;
            position: relative;
        }
        
        /* Video Player */
        #video-player {
            width: 100%;
            height: 100%;
            background-color: #000;
            outline: none;
        }
        
        /* Kanal Değişimi Bildirimi */
        .channel-notification {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.85);
            padding: 12px 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            z-index: 50;
            border: 2px solid #4CAF50;
            max-width: 400px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        
        .channel-notification.show {
            opacity: 1;
        }
        
        .notif-channel-logo {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            margin-right: 15px;
            object-fit: contain;
            background-color: #111;
            padding: 3px;
            flex-shrink: 0;
        }
        
        .notif-channel-name {
            font-size: 18px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* Sidebar Başlık */
        .sidebar-header {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #333;
            position: sticky;
            top: 0;
            background-color: #111;
            z-index: 1;
            padding-top: 5px;
        }
        
        .sidebar-title {
            font-size: 20px;
            color: #fff;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .channel-count {
            font-size: 14px;
            color: #4CAF50;
            background: rgba(76, 175, 80, 0.2);
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
        }
        
        /* Kanal Numaraları */
        .channel-number {
            display: inline-block;
            background: #4CAF50;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            text-align: center;
            line-height: 24px;
            font-size: 12px;
            font-weight: bold;
            margin-right: 8px;
        }
        
        /* Kanal Listesi */
        .channel-list {
            list-style: none;
            flex: 1;
        }
        
        .channel-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            margin-bottom: 6px;
            background-color: #222;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            position: relative;
        }
        
        .channel-item:hover {
            background-color: #333;
            border-color: #4CAF50;
        }
        
        .channel-item.active {
            background-color: #1a3c1f;
            border-color: #4CAF50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.3);
        }
        
        .channel-logo {
            width: 45px;
            height: 45px;
            border-radius: 6px;
            margin-right: 12px;
            object-fit: contain;
            background-color: #111;
            padding: 4px;
            flex-shrink: 0;
        }
        
        .channel-info {
            flex: 1;
            min-width: 0;
        }
        
        .channel-name {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .channel-group {
            font-size: 11px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* Scrollbar Stili - Akışkanlık için */
        .channels-sidebar::-webkit-scrollbar {
            width: 6px;
        }
        
        .channels-sidebar::-webkit-scrollbar-track {
            background: #222;
            border-radius: 3px;
        }
        
        .channels-sidebar::-webkit-scrollbar-thumb {
            background: #4CAF50;
            border-radius: 3px;
            transition: background 0.3s;
        }
        
        .channels-sidebar::-webkit-scrollbar-thumb:hover {
            background: #3d8b40;
        }
        
        /* TV Box için optimizasyonlar */
        .channel-item:focus {
            outline: 3px solid #4CAF50;
            outline-offset: 2px;
        }
        
        /* Tam Ekran Modu */
        body.fullscreen-mode {
            overflow: hidden;
        }
        
        body.fullscreen-mode .channels-sidebar {
            display: none;
        }
        
        body.fullscreen-mode .player-section {
            width: 100%;
            height: 100%;
        }
        
        /* Kısayol Bilgilendirmesi */
        .shortcut-info {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 8px;
            z-index: 50;
            border: 1px solid #444;
            font-size: 11px;
            color: #aaa;
            opacity: 0.7;
        }
        
        .shortcut-key {
            display: inline-block;
            background: #333;
            color: #4CAF50;
            padding: 1px 5px;
            border-radius: 3px;
            margin: 0 2px;
            font-weight: bold;
            font-size: 10px;
        }
        
        /* Yükleme göstergesi */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: #4CAF50;
            z-index: 10;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 12px 25px;
            border-radius: 8px;
            display: none;
        }
        
        .loading.show {
            display: block;
        }
        
        /* Küçük ekranlar için */
        @media (max-width: 768px) {
            .channels-sidebar {
                width: 280px;
            }
            
            .channel-item {
                padding: 8px 10px;
            }
            
            .channel-logo {
                width: 40px;
                height: 40px;
            }
            
            .channel-name {
                font-size: 14px;
            }
            
            .channel-notification {
                top: 10px;
                padding: 10px 15px;
                max-width: 300px;
            }
        }
        
        /* Dikey mod için */
        @media (max-height: 600px) {
            .channel-item {
                padding: 6px 8px;
                margin-bottom: 4px;
            }
            
            .channel-logo {
                width: 35px;
                height: 35px;
            }
        }
        
        /* Çift tıklama bilgisi */
        .double-click-hint {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 8px;
            z-index: 50;
            border: 1px solid #444;
            font-size: 11px;
            color: #4CAF50;
            opacity: 0.7;
            display: none;
        }
        
        body.fullscreen-mode .double-click-hint {
            display: block;
        }
    </style>
</head>

    <div class="split-container">
        <!-- Sol Kısım: Kanallar -->
        <div class="channels-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">TV KANALLARI <span class="channel-count" id="channel-count">0</span></div>
                <div style="font-size: 11px; color: #888; margin-top: 3px;">Çift tıklama: Tam ekran</div>

            <!-- Kanallar Listesi -->
            <ul class="channel-list" id="channel-list">
                <!-- Kanallar buraya JavaScript ile eklenecek -->

        </div>
        
        <!-- Sağ Kısım: Video Player -->
        <div class="player-section">
            <div id="player-container">
                <!-- Video Player -->
                <video id="video-player" controls playsinline></video>
                
                <!-- Kanal Değişimi Bildirimi -->
                <div class="channel-notification" id="channel-notification">

                <!-- Çift Tıklama Bilgisi -->
                <div class="double-click-hint">

                <!-- Yükleme Göstergesi -->
                <div class="loading" id="loading">Yükleniyor...</div>
            </div>
        </div>
        
        <!-- Kısayol Bilgilendirmesi -->
        <div class="shortcut-info">

        // DOM Elementleri
        const channelList = document.getElementById('channel-list');
        const videoPlayer = document.getElementById('video-player');
        const loadingIndicator = document.getElementById('loading');
        const channelCount = document.getElementById('channel-count');
        const channelNotification = document.getElementById('channel-notification');
        const notifChannelLogo = document.getElementById('notif-channel-logo');
        const notifChannelName = document.getElementById('notif-channel-name');

        // Değişkenler
        let channels = [];
        let currentChannel = null;
        let selectedChannelIndex = 0;
        let hls = null;
        let isFullscreen = false;
        let lastClickTime = 0;
        let lastClickChannel = null;
        let notificationTimeout = null;

        // M3U verisini parse et
        function parseM3U(data) {
            const lines = data.split('\n');
            const channels = [];
            let currentChannel = {};
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                if (line.startsWith('#EXTINF:')) {
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    const groupMatch = line.match(/group-title="([^"]+)"/);
                    const nameMatch = line.match(/,(.+)$/);
                    
                    currentChannel = {
                        logo: logoMatch ? logoMatch[1] : '',
                        group: groupMatch ? groupMatch[1] : 'Diğer',
                        name: nameMatch ? nameMatch[1].trim() : 'Bilinmeyen Kanal',
                        url: '',
                        number: channels.length + 1
                    };
                } else if (line && !line.startsWith('#') && currentChannel.name) {
                    currentChannel.url = line;
                    channels.push({...currentChannel});
                    currentChannel = {};
                }
            }
            
            return channels;
        }

        // Kanalları render et - Daha akışkan için requestAnimationFrame kullan
        function renderChannels() {
            channelList.innerHTML = '';
            
            // requestAnimationFrame ile smooth render
            requestAnimationFrame(() => {
                channels.forEach((channel, index) => {
                    const channelItem = document.createElement('li');
                    channelItem.className = 'channel-item';
                    channelItem.tabIndex = 0;
                    channelItem.dataset.index = index;
                    channelItem.dataset.number = channel.number;
                    
                    const logoUrl = channel.logo || 'https://via.placeholder.com/45x45/111/fff?text=TV';
                    const displayNumber = channel.number <= 10 ? channel.number : '';
                    
                    channelItem.innerHTML = `
                        ${displayNumber ? `<span class="channel-number">${displayNumber}</span>` : ''}
                        <img class="channel-logo" src="${logoUrl}" alt="${channel.name}" 
                             onerror="this.onerror=null; this.src='https://via.placeholder.com/45x45/111/fff?text=TV'">
                        <div class="channel-info">
                            <div class="channel-name">${channel.name}</div>
                            <div class="channel-group">${channel.group}</div>
                        </div>
                    `;
                    
                    // Tek tıklama: Kanalı aç
                    channelItem.addEventListener('click', handleChannelClick);
                    
                    // Çift tıklama: Tam ekran yap
                    channelItem.addEventListener('dblclick', handleChannelDoubleClick);
                    
                    // Klavye navigasyonu
                    channelItem.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') {
                            playChannel(channel);
                        }
                    });
                    
                    channelList.appendChild(channelItem);
                });
                
                // Kanal sayısını güncelle
                channelCount.textContent = channels.length;
            });
        }

        // Kanal tıklama işleyici
        function handleChannelClick(e) {
            const channelItem = e.currentTarget;
            const index = parseInt(channelItem.dataset.index);
            const channel = channels[index];
            const currentTime = new Date().getTime();
            
            // Çift tıklama kontrolü
            if (lastClickChannel === channel && (currentTime - lastClickTime) < 500) {
                // Çift tıklama - tam ekran yap
                handleChannelDoubleClick(e);
                lastClickTime = 0;
                lastClickChannel = null;
                return;
            }
            
            // Tek tıklama - kanalı aç
            lastClickTime = currentTime;
            lastClickChannel = channel;
            
            playChannel(channel);
        }

        // Kanal çift tıklama işleyici
        function handleChannelDoubleClick(e) {
            const channelItem = e.currentTarget;
            const index = parseInt(channelItem.dataset.index);
            const channel = channels[index];
            
            playChannel(channel);
            
            // Tam ekran yap
            setTimeout(() => {
                enterFullscreen();
            }, 300);
        }

        // Kanal oynat
        async function playChannel(channel) {
            showLoading();
            
            currentChannel = channel;
            selectedChannelIndex = channels.findIndex(c => c.name === channel.name);
            
            // Önceki HLS instance'ını temizle
            if (hls) {
                hls.destroy();
                hls = null;
            }
            
            // Video elementini sıfırla
            videoPlayer.pause();
            videoPlayer.removeAttribute('src');
            videoPlayer.load();
            
            // HLS.js kontrolü
            if (Hls.isSupported()) {
                hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    backBufferLength: 90
                });
                
                hls.loadSource(channel.url);
                hls.attachMedia(videoPlayer);
                
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    videoPlayer.play().then(() => {
                        hideLoading();
                        showChannelNotification(channel);
                    }).catch(e => {
                        console.log("Otomatik oynatma engellendi:", e);
                        hideLoading();
                        showChannelNotification(channel);
                    });
                });
                
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        switch(data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                console.error('Network error, trying to recover...');
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                console.error('Media error, trying to recover...');
                                hls.recoverMediaError();
                                break;
                            default:
                                console.error('Fatal HLS error, cannot recover');
                                hls.destroy();
                                hideLoading();
                                break;
                        }
                    }
                });
            } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                // Safari için native HLS desteği
                videoPlayer.src = channel.url;
                videoPlayer.addEventListener('loadedmetadata', () => {
                    videoPlayer.play().then(() => {
                        hideLoading();
                        showChannelNotification(channel);
                    }).catch(e => {
                        console.log("Otomatik oynatma engellendi:", e);
                        hideLoading();
                        showChannelNotification(channel);
                    });
                });
            } else {
                console.error("HLS desteklenmiyor");
                hideLoading();
            }
            
            // Aktif kanalı işaretle
            document.querySelectorAll('.channel-item').forEach(item => {
                item.classList.remove('active');
            });
            
            const activeItem = document.querySelector(`.channel-item[data-index="${selectedChannelIndex}"]`);
            if (activeItem) {
                activeItem.classList.add('active');
                activeItem.focus();
                
                // Aktif öğeyi görünür yap (smooth)
                setTimeout(() => {
                    activeItem.scrollIntoView({ 
                        behavior: 'smooth', 
                        block: 'center',
                        inline: 'nearest' 
                    });
                }, 100);
            }
        }

        // Kanal bildirimini göster (3 saniye sonra kaybolur)
        function showChannelNotification(channel) {
            // Önceki timeout'u temizle
            if (notificationTimeout) {
                clearTimeout(notificationTimeout);
            }
            
            const logoUrl = channel.logo || 'https://via.placeholder.com/40x40/111/fff?text=TV';
            notifChannelLogo.src = logoUrl;
            notifChannelLogo.onerror = function() {
                this.src = 'https://via.placeholder.com/40x40/111/fff?text=TV';
            };
            
            notifChannelName.textContent = channel.name;
            
            // Bildirimi göster
            channelNotification.classList.add('show');
            
            // 3 saniye sonra gizle
            notificationTimeout = setTimeout(() => {
                channelNotification.classList.remove('show');
            }, 3000);
        }

        // Tam ekran moduna gir
        function enterFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Tam ekran hatası: ${err.message}`);
                });
                isFullscreen = true;
            }
        }

        // Tam ekran modundan çık
        function exitFullscreen() {
            if (document.exitFullscreen) {
                document.exitFullscreen();
                isFullscreen = false;
            }
        }

        // Yükleme göster
        function showLoading() {
            loadingIndicator.classList.add('show');
        }

        // Yükleme gizle
        function hideLoading() {
            loadingIndicator.classList.remove('show');
        }

        // Önceki kanala git
        function previousChannel() {
            if (channels.length === 0) return;
            
            selectedChannelIndex = selectedChannelIndex > 0 ? selectedChannelIndex - 1 : channels.length - 1;
            playChannel(channels[selectedChannelIndex]);
        }

        // Sonraki kanala git
        function nextChannel() {
            if (channels.length === 0) return;
            
            selectedChannelIndex = selectedChannelIndex < channels.length - 1 ? selectedChannelIndex + 1 : 0;
            playChannel(channels[selectedChannelIndex]);
        }

        // Rakam tuşları ile kanal seç
        function selectChannelByNumber(number) {
            let channelIndex = -1;
            
            if (number === 0) {
                // 0 tuşu için 10. kanalı seç
                channelIndex = 9;
            } else if (number >= 1 && number <= 9) {
                // 1-9 arası için ilgili kanalı seç
                channelIndex = number - 1;
            }
            
            // Kanal varsa oynat
            if (channelIndex >= 0 && channelIndex < channels.length) {
                selectedChannelIndex = channelIndex;
                playChannel(channels[channelIndex]);
            }
        }

        // TV Box Klavye Kontrolleri
        document.addEventListener('keydown', (e) => {
            // ESC tuşu: Tam ekrandan çık
            if (e.key === 'Escape' || e.key === 'Backspace') {
                if (isFullscreen) {
                    exitFullscreen();
                }
                e.preventDefault();
                return;
            }
            
            // Yukarı/Aşağı ok tuşları ile kanal değiştir
            if (e.key === 'ArrowUp') {
                previousChannel();
                e.preventDefault();
            } else if (e.key === 'ArrowDown') {
                nextChannel();
                e.preventDefault();
            }
            
            // Rakam tuşları ile kanal seç
            if (e.key >= '0' && e.key <= '9') {
                const number = parseInt(e.key);
                selectChannelByNumber(number);
                e.preventDefault();
            }
            
            // Numpad rakamları
            if (e.key >= 'NumPad0' && e.key <= 'NumPad9') {
                const number = parseInt(e.key.replace('NumPad', ''));
                selectChannelByNumber(number);
                e.preventDefault();
            }
            
            // Tam ekran tuşu (F)
            if (e.key === 'f' || e.key === 'F') {
                if (isFullscreen) {
                    exitFullscreen();
                } else {
                    enterFullscreen();
                }
                e.preventDefault();
            }
            
            // Space veya P: Oynat/Duraklat
            if (e.key === ' ' || e.key === 'p' || e.key === 'P') {
                if (videoPlayer.paused) {
                    videoPlayer.play();
                } else {
                    videoPlayer.pause();
                }
                e.preventDefault();
            }
            
            // Ses kontrolü (+/-)
            if (e.key === '+' || e.key === 'VolumeUp') {
                videoPlayer.volume = Math.min(videoPlayer.volume + 0.1, 1);
                e.preventDefault();
            }
            
            if (e.key === '-' || e.key === 'VolumeDown') {
                videoPlayer.volume = Math.max(videoPlayer.volume - 0.1, 0);
                e.preventDefault();
            }
            
            // M: Sessiz aç/kapat
            if (e.key === 'm' || e.key === 'M') {
                videoPlayer.muted = !videoPlayer.muted;
                e.preventDefault();
            }
            
            // Enter: Tam ekran yap (normal modda)
            if (e.key === 'Enter' && !isFullscreen) {
                enterFullscreen();
                e.preventDefault();
            }
        });

        // Tam ekran değişikliklerini dinle
        document.addEventListener('fullscreenchange', () => {
            isFullscreen = !!document.fullscreenElement;
        });

        // Başlangıç işlemleri
        function init() {
            // M3U verisini parse et
            channels = parseM3U(m3uData);
            
            // Kanalları render et
            renderChannels();
            
            // Hata işleyici
            videoPlayer.addEventListener('error', hideLoading);
            videoPlayer.addEventListener('waiting', showLoading);
            videoPlayer.addEventListener('playing', hideLoading);
            
            // Varsayılan kanal olarak "===(( TR ULUSAL HD ))===" aç
            const defaultChannel = channels.find(ch => ch.name.includes("==="));
            if (defaultChannel) {
                setTimeout(() => playChannel(defaultChannel), 1000);
            } else if (channels.length > 0) {
                // Yoksa ilk kanalı aç
                setTimeout(() => playChannel(channels[0]), 1000);
            }
            
            // İlk kanala odaklan
            if (channelList.firstChild) {
                setTimeout(() => {
                    channelList.firstChild.focus();
                }, 1500);
            }
        }

        // Sayfa yüklendiğinde başlat
        document.addEventListener('DOMContentLoaded', init);
    </script>
