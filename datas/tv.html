<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Box Kanal Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        
        body {
            background-color: #111;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        
        .channel-list {
            width: 50%;
            background-color: #222;
            overflow-y: auto;
            padding: 10px;
            transition: all 0.3s;
        }
        
        .player-container {
            width: 50%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
        }
        
        .fullscreen {
            width: 100% !important;
        }
        
        .hidden {
            display: none !important;
        }
        
        .channel-item {
            padding: 15px;
            margin-bottom: 8px;
            background-color: #333;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }
        
        .channel-item:hover, .channel-item.active {
            background-color: #444;
            transform: scale(1.02);
        }
        
        .channel-number {
            display: inline-block;
            width: 40px;
            height: 40px;
            background-color: #555;
            border-radius: 50%;
            text-align: center;
            line-height: 40px;
            margin-right: 15px;
            font-weight: bold;
        }
        
        .channel-name {
            font-size: 18px;
        }
        
        #video-player {
            width: 100%;
            height: 100%;
            background-color: #000;
        }
        
        .player-info {
            padding: 15px;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .channel-info {
            font-size: 22px;
        }
        
        .controls {
            display: flex;
            gap: 15px;
        }
        
        .control-btn {
            background-color: #444;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .control-btn:hover {
            background-color: #555;
        }
        
        .status {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 18px;
            z-index: 100;
            display: none;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #fff;
            z-index: 100;
        }
        
        .channel-search {
            padding: 15px;
            background-color: #333;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        
        #channel-input {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            background-color: #222;
            border: 1px solid #555;
            color: white;
            border-radius: 5px;
        }
        
        .header {
            background-color: #222;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            border-bottom: 2px solid #444;
        }
        
        /* TV Box optimizasyonları */
        *:focus {
            outline: 2px solid #007bff;
        }
        
        /* Tam ekran modu */
        .fullscreen-mode .channel-list {
            width: 0;
            padding: 0;
            overflow: hidden;
        }
        
        .fullscreen-mode .player-container {
            width: 100%;
        }
        
        .fullscreen-mode .player-info {
            opacity: 0;
            transition: opacity 0.5s;
        }
        
        .fullscreen-mode .player-info:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="header">
        TV Box Kanal Player
        <div style="font-size: 16px; margin-top: 5px; color: #aaa;">Exit tuşu: Çıkış • OK tuşu: Oynat • Çift OK: Tam ekran</div>
    </div>
    
    <div class="container" id="container">
        <div class="channel-list" id="channel-list">
            <div class="channel-search">
                <input type="text" id="channel-input" placeholder="Kanal numarası girin (örn: 1, 5, 12...) veya arama yapın">
            </div>
            <div id="channels-container">
                <!-- Kanal listesi buraya yüklenecek -->
            </div>
        </div>
        
        <div class="player-container" id="player-container">
            <div class="player-info" id="player-info">
                <div class="channel-info" id="current-channel">Kanal Seçilmedi</div>
                <div class="controls">
                    <button class="control-btn" id="fullscreen-btn">Tam Ekran</button>
                    <button class="control-btn" id="exit-btn">Çıkış</button>
                </div>
            </div>
            <video id="video-player" controls></video>
        </div>
    </div>
    
    <div class="status" id="status"></div>
    <div class="loading" id="loading">Kanal listesi yükleniyor...</div>

    <script>
        // Uygulama durumu
        const state = {
            channels: [],
            currentChannel: null,
            currentChannelIndex: -1,
            isFullscreen: false,
            channelInput: '',
            inputTimeout: null,
            lastKeyPress: 0
        };

        // DOM elementleri
        const container = document.getElementById('container');
        const channelList = document.getElementById('channel-list');
        const playerContainer = document.getElementById('player-container');
        const videoPlayer = document.getElementById('video-player');
        const channelsContainer = document.getElementById('channels-container');
        const currentChannelDisplay = document.getElementById('current-channel');
        const statusDisplay = document.getElementById('status');
        const loadingDisplay = document.getElementById('loading');
        const channelInput = document.getElementById('channel-input');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const exitBtn = document.getElementById('exit-btn');
        const playerInfo = document.getElementById('player-info');

        // Tuş kodu sabitleri
        const KEY_ENTER = 13;
        const KEY_ESCAPE = 27;
        const KEY_UP = 38;
        const KEY_DOWN = 40;
        const KEY_LEFT = 37;
        const KEY_RIGHT = 39;
        const KEY_0 = 48;
        const KEY_9 = 57;
        const KEY_NUMPAD_0 = 96;
        const KEY_NUMPAD_9 = 105;

        // Uygulama başlatma
        document.addEventListener('DOMContentLoaded', initApp);

        async function initApp() {
            // Kanal listesini yükle
            await loadChannels();
            
            // Olay dinleyicilerini ekle
            setupEventListeners();
            
            // İlk kanalı seç
            if (state.channels.length > 0) {
                selectChannel(0);
            }
            
            // Yükleme göstergesini gizle
            loadingDisplay.style.display = 'none';
        }

        // Kanal listesini yükle
        async function loadChannels() {
            try {
                const response = await fetch('https://www.dropbox.com/scl/fi/vkdkuge489z1grdxjw459/yasin.txt?rlkey=kac7bu9xsg1ecdywyil2t0bms&st=5bndyxax&dl=1');
                const text = await response.text();
                
                // Metni satırlara ayır ve kanalları işle
                const lines = text.split('\n');
                let channelNumber = 1;
                
                lines.forEach(line => {
                    line = line.trim();
                    if (line && line.includes('|')) {
                        const parts = line.split('|');
                        const name = parts[0].trim();
                        const url = parts[1].trim();
                        
                        state.channels.push({
                            number: channelNumber,
                            name: name,
                            url: url
                        });
                        
                        channelNumber++;
                    }
                });
                
                // Kanal listesini görüntüle
                renderChannelList();
                
            } catch (error) {
                console.error('Kanal listesi yüklenirken hata:', error);
                showStatus('Kanal listesi yüklenemedi!', 'error');
                
                // Örnek kanallar (yüklenemediğinde kullanılacak)
                state.channels = [
                    { number: 1, name: "TRT 1", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
                    { number: 2, name: "Show TV", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
                    { number: 3, name: "Kanal D", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
                    { number: 4, name: "Star TV", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
                    { number: 5, name: "FOX", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
                    { number: 6, name: "ATV", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
                    { number: 7, name: "TV8", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
                    { number: 8, name: "CNN Türk", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
                    { number: 9, name: "Habertürk", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
                    { number: 10, name: "NTV", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" }
                ];
                
                renderChannelList();
            }
        }

        // Kanal listesini görüntüle
        function renderChannelList() {
            channelsContainer.innerHTML = '';
            
            state.channels.forEach((channel, index) => {
                const channelElement = document.createElement('div');
                channelElement.className = 'channel-item';
                channelElement.dataset.index = index;
                
                if (index === state.currentChannelIndex) {
                    channelElement.classList.add('active');
                }
                
                channelElement.innerHTML = `
                    <div class="channel-number">${channel.number}</div>
                    <div class="channel-name">${channel.name}</div>
                `;
                
                channelElement.addEventListener('click', () => {
                    selectChannel(index);
                    playChannel();
                });
                
                channelsContainer.appendChild(channelElement);
            });
        }

        // Kanal seç
        function selectChannel(index) {
            if (index >= 0 && index < state.channels.length) {
                // Önceki aktif kanalı temizle
                const prevActive = document.querySelector('.channel-item.active');
                if (prevActive) {
                    prevActive.classList.remove('active');
                }
                
                // Yeni kanalı aktif yap
                state.currentChannelIndex = index;
                state.currentChannel = state.channels[index];
                
                const newActive = document.querySelector(`.channel-item[data-index="${index}"]`);
                if (newActive) {
                    newActive.classList.add('active');
                    newActive.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                
                // Kanal bilgisini güncelle
                currentChannelDisplay.textContent = `${state.currentChannel.number}. ${state.currentChannel.name}`;
            }
        }

        // Kanalı oynat
        function playChannel() {
            if (!state.currentChannel) return;
            
            videoPlayer.src = state.currentChannel.url;
            videoPlayer.load();
            
            // Video yükleme olayları
            videoPlayer.addEventListener('loadeddata', () => {
                videoPlayer.play().catch(e => {
                    console.log("Otomatik oynatma engellendi:", e);
                    showStatus("Oynatma için OK tuşuna basın", "info");
                });
            });
            
            videoPlayer.addEventListener('error', () => {
                showStatus('Kanal yüklenemedi!', 'error');
            });
            
            showStatus(`${state.currentChannel.number}. ${state.currentChannel.name} yükleniyor...`, 'info');
        }

        // Tam ekran yap
        function toggleFullscreen() {
            if (!state.isFullscreen) {
                // Tam ekrana geç
                container.classList.add('fullscreen-mode');
                playerInfo.style.opacity = '0';
                state.isFullscreen = true;
                
                // Video kontrollerini gizle (tam ekranda)
                setTimeout(() => {
                    videoPlayer.controls = false;
                }, 100);
                
                showStatus('Tam Ekran (Çıkış için Exit)', 'info');
            } else {
                // Tam ekrandan çık
                container.classList.remove('fullscreen-mode');
                playerInfo.style.opacity = '1';
                state.isFullscreen = false;
                videoPlayer.controls = true;
            }
        }

        // Durum mesajı göster
        function showStatus(message, type = 'info') {
            statusDisplay.textContent = message;
            statusDisplay.style.display = 'block';
            statusDisplay.style.backgroundColor = type === 'error' ? 'rgba(220, 53, 69, 0.9)' : 'rgba(0, 0, 0, 0.8)';
            
            // 3 saniye sonra gizle
            clearTimeout(state.statusTimeout);
            state.statusTimeout = setTimeout(() => {
                statusDisplay.style.display = 'none';
            }, 3000);
        }

        // Olay dinleyicilerini kur
        function setupEventListeners() {
            // Klavye olayları
            document.addEventListener('keydown', handleKeyDown);
            
            // Çift tıklama için zamanlayıcı
            let lastClickTime = 0;
            
            // Video tıklama olayı (çift tıklama ile tam ekran)
            videoPlayer.addEventListener('click', (e) => {
                const currentTime = new Date().getTime();
                const timeSinceLastClick = currentTime - lastClickTime;
                
                if (timeSinceLastClick < 300) { // 300ms içinde çift tıklama
                    toggleFullscreen();
                    e.preventDefault();
                }
                
                lastClickTime = currentTime;
            });
            
            // Tam ekran butonu
            fullscreenBtn.addEventListener('click', toggleFullscreen);
            
            // Çıkış butonu
            exitBtn.addEventListener('click', () => {
                if (state.isFullscreen) {
                    toggleFullscreen();
                } else {
                    if (confirm('Uygulamadan çıkmak istediğinize emin misiniz?')) {
                        window.close();
                    }
                }
            });
            
            // Kanal arama/giriş alanı
            channelInput.addEventListener('input', (e) => {
                const value = e.target.value;
                
                // Sayısal değer ise kanal numarasına göre filtrele
                if (/^\d+$/.test(value)) {
                    const channelNum = parseInt(value);
                    const channelIndex = state.channels.findIndex(c => c.number === channelNum);
                    
                    if (channelIndex !== -1) {
                        selectChannel(channelIndex);
                        // Otomatik oynatma
                        clearTimeout(state.inputTimeout);
                        state.inputTimeout = setTimeout(() => {
                            playChannel();
                            channelInput.value = '';
                        }, 1000);
                    }
                } else if (value.length > 0) {
                    // Metin ise kanal adına göre filtrele
                    const filtered = state.channels.filter(c => 
                        c.name.toLowerCase().includes(value.toLowerCase())
                    );
                    
                    // Filtrelenmiş listeyi göster
                    renderFilteredList(filtered);
                } else {
                    // Değer boş ise tüm listeyi göster
                    renderChannelList();
                }
            });
            
            // Video oynatma olayları
            videoPlayer.addEventListener('play', () => {
                showStatus(`Oynatılıyor: ${state.currentChannel.name}`, 'info');
            });
        }

        // Filtrelenmiş kanal listesini göster
        function renderFilteredList(filteredChannels) {
            channelsContainer.innerHTML = '';
            
            filteredChannels.forEach((channel, index) => {
                const originalIndex = state.channels.findIndex(c => c.number === channel.number);
                const channelElement = document.createElement('div');
                channelElement.className = 'channel-item';
                channelElement.dataset.index = originalIndex;
                
                if (originalIndex === state.currentChannelIndex) {
                    channelElement.classList.add('active');
                }
                
                channelElement.innerHTML = `
                    <div class="channel-number">${channel.number}</div>
                    <div class="channel-name">${channel.name}</div>
                `;
                
                channelElement.addEventListener('click', () => {
                    selectChannel(originalIndex);
                    playChannel();
                    channelInput.value = '';
                    renderChannelList(); // Orijinal listeye geri dön
                });
                
                channelsContainer.appendChild(channelElement);
            });
        }

        // Klavye olaylarını işle
        function handleKeyDown(e) {
            const key = e.keyCode;
            
            // Exit tuşu (ESC)
            if (key === KEY_ESCAPE) {
                if (state.isFullscreen) {
                    toggleFullscreen();
                } else {
                    if (confirm('Uygulamadan çıkmak istediğinize emin misiniz?')) {
                        window.close();
                    }
                }
                e.preventDefault();
                return;
            }
            
            // OK tuşu (Enter) - Oynatma/Tam ekran
            if (key === KEY_ENTER) {
                const currentTime = new Date().getTime();
                
                if (currentTime - state.lastKeyPress < 300) { // Çift tıklama benzeri
                    toggleFullscreen();
                } else {
                    if (state.currentChannel) {
                        playChannel();
                    }
                }
                
                state.lastKeyPress = currentTime;
                e.preventDefault();
                return;
            }
            
            // Yukarı ok tuşu - Önceki kanal
            if (key === KEY_UP) {
                if (state.currentChannelIndex > 0) {
                    const newIndex = state.currentChannelIndex - 1;
                    selectChannel(newIndex);
                    
                    // Tam ekranda ise otomatik oynat
                    if (state.isFullscreen) {
                        playChannel();
                    }
                }
                e.preventDefault();
                return;
            }
            
            // Aşağı ok tuşu - Sonraki kanal
            if (key === KEY_DOWN) {
                if (state.currentChannelIndex < state.channels.length - 1) {
                    const newIndex = state.currentChannelIndex + 1;
                    selectChannel(newIndex);
                    
                    // Tam ekranda ise otomatik oynat
                    if (state.isFullscreen) {
                        playChannel();
                    }
                }
                e.preventDefault();
                return;
            }
            
            // Sol ok tuşu - 10 kanal geri
            if (key === KEY_LEFT) {
                const newIndex = Math.max(0, state.currentChannelIndex - 10);
                selectChannel(newIndex);
                e.preventDefault();
                return;
            }
            
            // Sağ ok tuşu - 10 kanal ileri
            if (key === KEY_RIGHT) {
                const newIndex = Math.min(state.channels.length - 1, state.currentChannelIndex + 10);
                selectChannel(newIndex);
                e.preventDefault();
                return;
            }
            
            // Sayı tuşları (0-9) - Doğrudan kanal seçme
            let channelNum = -1;
            
            // Normal sayı tuşları
            if (key >= KEY_0 && key <= KEY_9) {
                channelNum = key - KEY_0;
            }
            
            // Numpad sayı tuşları
            if (key >= KEY_NUMPAD_0 && key <= KEY_NUMPAD_9) {
                channelNum = key - KEY_NUMPAD_0;
            }
            
            if (channelNum !== -1) {
                // Mevcut kanal girişine ekle
                state.channelInput += channelNum.toString();
                channelInput.value = state.channelInput;
                
                // 1 saniye sonra kanalı seç ve oynat
                clearTimeout(state.inputTimeout);
                state.inputTimeout = setTimeout(() => {
                    const inputNum = parseInt(state.channelInput);
                    const channelIndex = state.channels.findIndex(c => c.number === inputNum);
                    
                    if (channelIndex !== -1) {
                        selectChannel(channelIndex);
                        playChannel();
                    } else {
                        showStatus(`Kanal ${inputNum} bulunamadı!`, 'error');
                    }
                    
                    state.channelInput = '';
                    channelInput.value = '';
                }, 1000);
                
                e.preventDefault();
            }
        }
    </script>
</body>
</html>
