<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Box Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Roboto', Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        
        /* Ana Konteyner - Ekranı ikiye bölecek */
        .split-container {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        /* Sol Kısım - Kanallar Listesi (30%) */
        .channels-sidebar {
            width: 30%;
            max-width: 400px;
            min-width: 250px;
            background-color: #111;
            border-right: 3px solid #222;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }
        
        /* Sağ Kısım - Video Player (70%) */
        .player-section {
            flex: 1;
            background-color: #000;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Player Konteyneri */
        #player-container {
            flex: 1;
            background-color: #000;
            position: relative;
        }
        
        /* Shaka Player için özel stil */
        #video-player {
            width: 100%;
            height: 100%;
            background-color: #000;
        }
        
        /* Player Kontrolleri */
        .player-controls {
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 20px;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 5;
        }
        
        #player-container:hover .player-controls {
            opacity: 1;
        }
        
        .player-btn {
            width: 50px;
            height: 50px;
            background-color: rgba(0, 0, 0, 0.7);
            border: 2px solid #555;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .player-btn:hover {
            background-color: rgba(76, 175, 80, 0.8);
            border-color: #4CAF50;
        }
        
        /* Şu anki Kanal Bilgisi */
        .current-channel-display {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 12px 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            z-index: 50;
            border: 2px solid #444;
            max-width: 350px;
        }
        
        .current-channel-logo {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            margin-right: 15px;
            object-fit: contain;
            background-color: #111;
            padding: 3px;
            flex-shrink: 0;
        }
        
        .current-channel-name {
            font-size: 18px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* Sidebar Başlık */
        .sidebar-header {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #333;
        }
        
        .sidebar-title {
            font-size: 22px;
            color: #fff;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .channel-count {
            font-size: 14px;
            color: #4CAF50;
            background: rgba(76, 175, 80, 0.2);
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
        }
        
        /* Kanal Numaraları */
        .channel-number {
            display: inline-block;
            background: #4CAF50;
            color: white;
            width: 26px;
            height: 26px;
            border-radius: 4px;
            text-align: center;
            line-height: 26px;
            font-size: 14px;
            font-weight: bold;
            margin-right: 10px;
        }
        
        /* Kanal Listesi */
        .channel-list {
            list-style: none;
            flex: 1;
        }
        
        .channel-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 8px;
            background-color: #222;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            position: relative;
        }
        
        .channel-item:hover,
        .channel-item:focus {
            background-color: #333;
            border-color: #4CAF50;
        }
        
        .channel-item.active {
            background-color: #1a3c1f;
            border-color: #4CAF50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.3);
        }
        
        .channel-logo {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            margin-right: 15px;
            object-fit: contain;
            background-color: #111;
            padding: 5px;
            flex-shrink: 0;
        }
        
        .channel-info {
            flex: 1;
            min-width: 0;
        }
        
        .channel-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .channel-group {
            font-size: 12px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* Tam Ekran Modu */
        body.fullscreen-mode {
            overflow: hidden;
        }
        
        body.fullscreen-mode .channels-sidebar {
            display: none;
        }
        
        body.fullscreen-mode .player-section {
            width: 100%;
            height: 100%;
        }
        
        body.fullscreen-mode .current-channel-display {
            top: 30px;
            left: 30px;
            font-size: 20px;
            padding: 15px 25px;
        }
        
        body.fullscreen-mode .current-channel-name {
            font-size: 22px;
        }
        
        body.fullscreen-mode .current-channel-logo {
            width: 50px;
            height: 50px;
        }
        
        /* Scrollbar Stili */
        .channels-sidebar::-webkit-scrollbar {
            width: 8px;
        }
        
        .channels-sidebar::-webkit-scrollbar-track {
            background: #222;
        }
        
        .channels-sidebar::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }
        
        .channels-sidebar::-webkit-scrollbar-thumb:hover {
            background: #777;
        }
        
        /* TV Box için optimizasyonlar */
        .channel-item:focus {
            outline: 3px solid #4CAF50;
            outline-offset: 2px;
        }
        
        /* Kısayol Bilgilendirmesi */
        .shortcut-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
            z-index: 50;
            border: 2px solid #444;
            font-size: 12px;
            color: #aaa;
        }
        
        .shortcut-key {
            display: inline-block;
            background: #333;
            color: #4CAF50;
            padding: 2px 6px;
            border-radius: 4px;
            margin: 0 2px;
            font-weight: bold;
        }
        
        /* Yükleme göstergesi */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            color: #4CAF50;
            z-index: 10;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            border-radius: 8px;
            display: none;
        }
        
        .loading.show {
            display: block;
        }
        
        /* Çift tıklama bilgisi */
        .double-click-info {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 50;
            border: 2px solid #444;
            font-size: 14px;
            color: #4CAF50;
            display: none;
        }
        
        body.fullscreen-mode .double-click-info {
            display: block;
        }
        
        /* Küçük ekranlar için */
        @media (max-width: 768px) {
            .channels-sidebar {
                width: 250px;
            }
            
            .channel-item {
                padding: 10px;
            }
            
            .channel-logo {
                width: 40px;
                height: 40px;
            }
            
            .channel-name {
                font-size: 14px;
            }
        }
        
        /* Dikey mod için */
        @media (max-height: 600px) {
            .channel-item {
                padding: 8px 10px;
                margin-bottom: 5px;
            }
            
            .channel-logo {
                width: 35px;
                height: 35px;
            }
        }

        // DOM Elementleri
        const channelList = document.getElementById('channel-list');
        const currentChannelLogo = document.getElementById('current-channel-logo');
        const currentChannelName = document.getElementById('current-channel-name');
        const loadingIndicator = document.getElementById('loading');
        const channelCount = document.getElementById('channel-count');
        const videoPlayer = document.getElementById('video-player');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const volumeUpBtn = document.getElementById('volume-up-btn');
        const volumeDownBtn = document.getElementById('volume-down-btn');
        const fullscreenBtn = document.getElementById('fullscreen-btn');

        // Değişkenler
        let channels = [];
        let currentChannel = null;
        let selectedChannelIndex = 0;
        let player = null;
        let ui = null;
        let isFullscreen = false;
        let lastClickTime = 0;
        let lastClickChannel = null;
        let numberInputBuffer = '';
        let numberInputTimeout = null;

        // M3U verisini parse et
        function parseM3U(data) {
            const lines = data.split('\n');
            const channels = [];
            let currentChannel = {};
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                if (line.startsWith('#EXTINF:')) {
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    const groupMatch = line.match(/group-title="([^"]+)"/);
                    const nameMatch = line.match(/,(.+)$/);
                    
                    currentChannel = {
                        logo: logoMatch ? logoMatch[1] : '',
                        group: groupMatch ? groupMatch[1] : 'Diğer',
                        name: nameMatch ? nameMatch[1].trim() : 'Bilinmeyen Kanal',
                        url: '',
                        number: channels.length + 1
                    };
                } else if (line && !line.startsWith('#') && currentChannel.name) {
                    currentChannel.url = line;
                    channels.push({...currentChannel});
                    currentChannel = {};
                }
            }
            
            return channels;
        }

        // Kanalları render et
        function renderChannels() {
            channelList.innerHTML = '';
            
            channels.forEach((channel, index) => {
                const channelItem = document.createElement('li');
                channelItem.className = 'channel-item';
                channelItem.tabIndex = 0;
                channelItem.dataset.index = index;
                channelItem.dataset.number = channel.number;
                
                const logoUrl = channel.logo || 'https://via.placeholder.com/50x50/111/fff?text=TV';
                const displayNumber = channel.number <= 10 ? channel.number : '';
                
                channelItem.innerHTML = `
                    ${displayNumber ? `<span class="channel-number">${displayNumber}</span>` : ''}
                    <img class="channel-logo" src="${logoUrl}" alt="${channel.name}" 
                         onerror="this.onerror=null; this.src='https://via.placeholder.com/50x50/111/fff?text=TV'">
                    <div class="channel-info">
                        <div class="channel-name">${channel.name}</div>
                        <div class="channel-group">${channel.group}</div>
                    </div>
                `;
                
                // Tek tıklama: Kanalı aç
                channelItem.addEventListener('click', handleChannelClick);
                
                // Çift tıklama: Tam ekran yap
                channelItem.addEventListener('dblclick', handleChannelDoubleClick);
                
                // Klavye navigasyonu
                channelItem.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        playChannel(channel);
                    }
                });
                
                channelList.appendChild(channelItem);
            });
            
            // Kanal sayısını güncelle
            channelCount.textContent = channels.length;
        }

        // Kanal tıklama işleyici
        function handleChannelClick(e) {
            const channelItem = e.currentTarget;
            const index = parseInt(channelItem.dataset.index);
            const channel = channels[index];
            const currentTime = new Date().getTime();
            
            // Çift tıklama kontrolü
            if (lastClickChannel === channel && (currentTime - lastClickTime) < 500) {
                // Çift tıklama - tam ekran yap
                handleChannelDoubleClick(e);
                lastClickTime = 0;
                lastClickChannel = null;
                return;
            }
            
            // Tek tıklama - kanalı aç
            lastClickTime = currentTime;
            lastClickChannel = channel;
            
            playChannel(channel);
        }

        // Kanal çift tıklama işleyici
        function handleChannelDoubleClick(e) {
            const channelItem = e.currentTarget;
            const index = parseInt(channelItem.dataset.index);
            const channel = channels[index];
            
            playChannel(channel);
            
            // Tam ekran yap
            setTimeout(() => {
                enterFullscreen();
            }, 300);
        }

        // Kanal oynat
        async function playChannel(channel) {
            showLoading();
            
            currentChannel = channel;
            selectedChannelIndex = channels.findIndex(c => c.name === channel.name);
            
            try {
                // Shaka Player ile kanalı yükle
                await player.load(channel.url);
                
                // Görsel bilgileri güncelle
                const logoUrl = channel.logo || 'https://via.placeholder.com/40x40/111/fff?text=TV';
                currentChannelLogo.src = logoUrl;
                currentChannelLogo.onerror = function() {
                    this.src = 'https://via.placeholder.com/40x40/111/fff?text=TV';
                };
                
                currentChannelName.textContent = channel.name;
                
                // Aktif kanalı işaretle
                document.querySelectorAll('.channel-item').forEach(item => {
                    item.classList.remove('active');
                });
                
                const activeItem = document.querySelector(`.channel-item[data-index="${selectedChannelIndex}"]`);
                if (activeItem) {
                    activeItem.classList.add('active');
                    activeItem.focus();
                    
                    // Aktif öğeyi görünür yap (smooth)
                    activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
                
                hideLoading();
            } catch (error) {
                console.error('Kanal yükleme hatası:', error);
                hideLoading();
                currentChannelName.textContent = `${channel.name} (Hata)`;
            }
        }

        // Tam ekran moduna gir
        function enterFullscreen() {
            document.body.classList.add('fullscreen-mode');
            isFullscreen = true;
            
            // Video elementine odaklan
            videoPlayer.focus();
            
            // Çift tıklama bilgisini göster
            setTimeout(() => {
                document.querySelector('.double-click-info').style.display = 'block';
            }, 1000);
        }

        // Tam ekran modundan çık
        function exitFullscreen() {
            document.body.classList.remove('fullscreen-mode');
            isFullscreen = false;
            
            // Çift tıklama bilgisini gizle
            document.querySelector('.double-click-info').style.display = 'none';
        }

        // Yükleme göster
        function showLoading() {
            loadingIndicator.classList.add('show');
        }

        // Yükleme gizle
        function hideLoading() {
            loadingIndicator.classList.remove('show');
        }

        // Önceki kanala git
        function previousChannel() {
            if (channels.length === 0) return;
            
            selectedChannelIndex = selectedChannelIndex > 0 ? selectedChannelIndex - 1 : channels.length - 1;
            playChannel(channels[selectedChannelIndex]);
        }

        // Sonraki kanala git
        function nextChannel() {
            if (channels.length === 0) return;
            
            selectedChannelIndex = selectedChannelIndex < channels.length - 1 ? selectedChannelIndex + 1 : 0;
            playChannel(channels[selectedChannelIndex]);
        }

        // Rakam tuşları ile kanal seç
        function selectChannelByNumber(number) {
            let channelIndex = -1;
            
            if (number === 0) {
                // 0 tuşu için 10. kanalı seç
                channelIndex = 9;
            } else if (number >= 1 && number <= 9) {
                // 1-9 arası için ilgili kanalı seç
                channelIndex = number - 1;
            }
            
            // Kanal varsa oynat
            if (channelIndex >= 0 && channelIndex < channels.length) {
                selectedChannelIndex = channelIndex;
                playChannel(channels[channelIndex]);
            }
        }

        // Çok haneli numara girişi için
        function handleNumberInput(number) {
            clearTimeout(numberInputTimeout);
            
            numberInputBuffer += number.toString();
            
            // 2 saniye içinde başka tuşa basılmazsa işle
            numberInputTimeout = setTimeout(() => {
                if (numberInputBuffer.length > 0) {
                    const channelNumber = parseInt(numberInputBuffer);
                    
                    // Kanal numarasına göre kanalı bul
                    let channelIndex = channels.findIndex(ch => ch.number === channelNumber);
                    
                    if (channelIndex !== -1) {
                        selectedChannelIndex = channelIndex;
                        playChannel(channels[channelIndex]);
                    }
                    
                    numberInputBuffer = '';
                }
            }, 2000);
        }

        // TV Box Klavye Kontrolleri
        document.addEventListener('keydown', (e) => {
            // ESC tuşu: Tam ekrandan çık veya normal moda dön
            if (e.key === 'Escape' || e.key === 'Backspace') {
                if (isFullscreen) {
                    exitFullscreen();
                }
                e.preventDefault();
                return;
            }
            
            // Yukarı/Aşağı ok tuşları ile kanal değiştir
            if (e.key === 'ArrowUp') {
                previousChannel();
                e.preventDefault();
            } else if (e.key === 'ArrowDown') {
                nextChannel();
                e.preventDefault();
            }
            
            // Rakam tuşları ile kanal seç
            if (e.key >= '0' && e.key <= '9') {
                const number = parseInt(e.key);
                if (isFullscreen) {
                    // Tam ekranda direkt kanal seç
                    selectChannelByNumber(number);
                } else {
                    // Normal modda çok haneli numara girişi
                    handleNumberInput(number);
                }
                e.preventDefault();
            }
            
            // Numpad rakamları
            if (e.key >= 'NumPad0' && e.key <= 'NumPad9') {
                const number = parseInt(e.key.replace('NumPad', ''));
                if (isFullscreen) {
                    selectChannelByNumber(number);
                } else {
                    handleNumberInput(number);
                }
                e.preventDefault();
            }
            
            // Tam ekran tuşu (F)
            if (e.key === 'f' || e.key === 'F') {
                if (isFullscreen) {
                    exitFullscreen();
                } else {
                    enterFullscreen();
                }
                e.preventDefault();
            }
            
            // Space veya P: Oynat/Duraklat
            if (e.key === ' ' || e.key === 'p' || e.key === 'P') {
                if (videoPlayer.paused) {
                    videoPlayer.play();
                    playPauseBtn.innerHTML = '⏸️';
                } else {
                    videoPlayer.pause();
                    playPauseBtn.innerHTML = '▶️';
                }
                e.preventDefault();
            }
            
            // Ses kontrolü (+/-)
            if (e.key === '+' || e.key === 'VolumeUp') {
                videoPlayer.volume = Math.min(videoPlayer.volume + 0.1, 1);
                e.preventDefault();
            }
            
            if (e.key === '-' || e.key === 'VolumeDown') {
                videoPlayer.volume = Math.max(videoPlayer.volume - 0.1, 0);
                e.preventDefault();
            }
            
            // M: Sessiz aç/kapat
            if (e.key === 'm' || e.key === 'M') {
                videoPlayer.muted = !videoPlayer.muted;
                e.preventDefault();
            }
            
            // Enter: Tam ekran yap (normal modda)
            if (e.key === 'Enter' && !isFullscreen) {
                enterFullscreen();
                e.preventDefault();
            }
        });

        // Başlangıç işlemleri
        async function init() {
            // Shaka Player'ı başlat
            shaka.polyfill.installAll();
            
            if (shaka.Player.isBrowserSupported()) {
                player = new shaka.Player(videoPlayer);
                
                // Hata işleyici
                player.addEventListener('error', (error) => {
                    console.error('Shaka Player hatası:', error);
                    hideLoading();
                });
                
                // Yükleme olayları
                videoPlayer.addEventListener('waiting', showLoading);
                videoPlayer.addEventListener('playing', hideLoading);
                videoPlayer.addEventListener('error', hideLoading);
            } else {
                console.error('Tarayıcı Shaka Player\'ı desteklemiyor');
            }
            
            // M3U verisini parse et
            channels = parseM3U(m3uData);
            
            // Kanalları render et
            renderChannels();
            
            // Event listener'ları ekle
            playPauseBtn.addEventListener('click', () => {
                if (videoPlayer.paused) {
                    videoPlayer.play();
                    playPauseBtn.innerHTML = '⏸️';
                } else {
                    videoPlayer.pause();
                    playPauseBtn.innerHTML = '▶️';
                }
            });
            
            volumeUpBtn.addEventListener('click', () => {
                videoPlayer.volume = Math.min(videoPlayer.volume + 0.1, 1);
            });
            
            volumeDownBtn.addEventListener('click', () => {
                videoPlayer.volume = Math.max(videoPlayer.volume - 0.1, 0);
            });
            
            fullscreenBtn.addEventListener('click', () => {
                if (isFullscreen) {
                    exitFullscreen();
                } else {
                    enterFullscreen();
                }
            });
            
            // Varsayılan kanal olarak FURKAN & SÜMEYYE'yi aç
            const defaultChannel = channels.find(ch => ch.name.includes('FURKAN'));
            if (defaultChannel) {
                setTimeout(() => playChannel(defaultChannel), 1000);
            } else if (channels.length > 0) {
                // Yoksa ilk kanalı aç
                setTimeout(() => playChannel(channels[0]), 1000);
            }
            
            // İlk kanala odaklan
            if (channelList.firstChild) {
                setTimeout(() => {
                    channelList.firstChild.focus();
                }, 1500);
            }
        }

        // Sayfa yüklendiğinde başlat
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
