<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Box Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        
        /* TV Oynatıcı Konteyneri */
        .tv-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #000;
        }
        
        /* Video Player */
        #video-player {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #000;
        }
        
        /* Kanallar Sidebar (Gizli) */
        .channels-sidebar {
            position: absolute;
            left: -350px;
            top: 0;
            width: 350px;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            border-right: 3px solid #333;
            z-index: 100;
            transition: left 0.3s ease;
            overflow-y: auto;
            padding: 15px;
            box-shadow: 5px 0 15px rgba(0, 0, 0, 0.7);
        }
        
        .channels-sidebar.open {
            left: 0;
        }
        
        /* Sidebar Başlık */
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #444;
        }
        
        .sidebar-title {
            font-size: 24px;
            color: #fff;
            font-weight: bold;
        }
        
        .close-sidebar {
            background: #555;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Kanal Kategorileri */
        .channel-category {
            margin-bottom: 25px;
        }
        
        .category-title {
            font-size: 18px;
            color: #4CAF50;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #444;
        }
        
        /* Kanal Listesi */
        .channel-list {
            list-style: none;
        }
        
        .channel-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            background-color: #222;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        
        .channel-item:hover,
        .channel-item:focus {
            background-color: #333;
            border-color: #4CAF50;
            transform: translateX(5px);
        }
        
        .channel-item.active {
            background-color: #1a3c1f;
            border-color: #4CAF50;
        }
        
        .channel-logo {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            margin-right: 15px;
            object-fit: contain;
            background-color: #111;
            padding: 5px;
        }
        
        .channel-info {
            flex: 1;
        }
        
        .channel-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        
        .channel-group {
            font-size: 14px;
            color: #aaa;
        }
        
        /* Menü Butonu */
        .menu-button {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 60px;
            height: 60px;
            background-color: rgba(0, 0, 0, 0.7);
            border: 2px solid #555;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .menu-button:hover {
            background-color: rgba(76, 175, 80, 0.8);
            border-color: #4CAF50;
        }
        
        /* Şu anki Kanal Bilgisi */
        .current-channel-info {
            position: absolute;
            top: 20px;
            left: 100px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            z-index: 50;
            border: 2px solid #444;
        }
        
        .current-channel-logo {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            margin-right: 15px;
            object-fit: contain;
            background-color: #111;
            padding: 3px;
        }
        
        .current-channel-name {
            font-size: 20px;
            font-weight: bold;
        }
        
        /* Kontroller */
        .controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .tv-container:hover .controls {
            opacity: 1;
        }
        
        .control-button {
            width: 70px;
            height: 70px;
            background-color: rgba(0, 0, 0, 0.7);
            border: 2px solid #555;
            border-radius: 50%;
            color: white;
            font-size: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .control-button:hover {
            background-color: rgba(76, 175, 80, 0.8);
            border-color: #4CAF50;
        }
        
        /* Scrollbar Stili */
        .channels-sidebar::-webkit-scrollbar {
            width: 8px;
        }
        
        .channels-sidebar::-webkit-scrollbar-track {
            background: #222;
        }
        
        .channels-sidebar::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }
        
        .channels-sidebar::-webkit-scrollbar-thumb:hover {
            background: #777;
        }
        
        /* TV Box için optimizasyonlar */
        .channel-item:focus {
            outline: 3px solid #4CAF50;
            outline-offset: 2px;
        }
        
        /* Fokus yönetimi için */
        *:focus {
            outline: 2px solid #4CAF50;
        }
        
        /* Küçük ekranlar için */
        @media (max-width: 768px) {
            .channels-sidebar {
                width: 300px;
                left: -300px;
            }
            
            .menu-button {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }
            
            .current-channel-info {
                left: 80px;
            }
        }
        
        /* Tam ekran modu için */
        :fullscreen #video-player {
            object-fit: contain;
        }
        
        /* Yükleme göstergesi */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #4CAF50;
            z-index: 10;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 20px 40px;
            border-radius: 10px;
            display: none;
        }
        
        .loading.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="tv-container">
        <!-- Video Oynatıcı -->
        <video id="video-player" controls playsinline>
            <source src="" type="application/x-mpegURL">
            Tarayıcınız bu video formatını desteklemiyor.
        </video>
        
        <!-- Menü Butonu -->
        <button class="menu-button" id="menu-button" title="Menü (M Tuşu)">
            ≡
        </button>
        
        <!-- Şu anki Kanal Bilgisi -->
        <div class="current-channel-info">
            <img id="current-channel-logo" class="current-channel-logo" src="https://via.placeholder.com/40x40/111/fff?text=TV" alt="Kanal">
            <div id="current-channel-name" class="current-channel-name">Kanal Seçin</div>
        </div>
        
        <!-- Yükleme Göstergesi -->
        <div class="loading" id="loading">Yükleniyor...</div>
        
        <!-- Kontroller -->
        <div class="controls">
            <button class="control-button" id="fullscreen-button" title="Tam Ekran (F)">
                ⛶
            </button>
            <button class="control-button" id="volume-up-button" title="Ses Aç (+)">
                🔊
            </button>
            <button class="control-button" id="volume-down-button" title="Ses Kapat (-)">
                🔈
            </button>
            <button class="control-button" id="info-button" title="Bilgi (I)">
                ⓘ
            </button>
        </div>
        
        <!-- Kanallar Sidebar -->
        <div class="channels-sidebar" id="channels-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">KANALLAR</div>
                <button class="close-sidebar" id="close-sidebar" title="Kapat (ESC)">×</button>
            </div>
            
            <!-- Kanallar buraya JavaScript ile eklenecek -->
            <div id="channels-container"></div>
        </div>
    </div>

        // DOM Elementleri
        const videoPlayer = document.getElementById('video-player');
        const channelsSidebar = document.getElementById('channels-sidebar');
        const menuButton = document.getElementById('menu-button');
        const closeSidebar = document.getElementById('close-sidebar');
        const channelsContainer = document.getElementById('channels-container');
        const currentChannelLogo = document.getElementById('current-channel-logo');
        const currentChannelName = document.getElementById('current-channel-name');
        const loadingIndicator = document.getElementById('loading');
        const fullscreenButton = document.getElementById('fullscreen-button');
        const volumeUpButton = document.getElementById('volume-up-button');
        const volumeDownButton = document.getElementById('volume-down-button');
        const infoButton = document.getElementById('info-button');

        // Değişkenler
        let channels = [];
        let currentChannel = null;
        let sidebarOpen = false;

        // M3U verisini parse eden fonksiyon
        function parseM3U(data) {
            const lines = data.split('\n');
            const channels = [];
            let currentChannel = {};
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                if (line.startsWith('#EXTINF:')) {
                    // Kanal bilgilerini ayıklama
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    const groupMatch = line.match(/group-title="([^"]+)"/);
                    const nameMatch = line.match(/,(.+)$/);
                    
                    currentChannel = {
                        logo: logoMatch ? logoMatch[1] : '',
                        group: groupMatch ? groupMatch[1] : 'Diğer',
                        name: nameMatch ? nameMatch[1].trim() : 'Bilinmeyen Kanal',
                        url: ''
                    };
                } else if (line && !line.startsWith('#') && currentChannel.name) {
                    // URL satırı
                    currentChannel.url = line;
                    channels.push({...currentChannel});
                    currentChannel = {};
                }
            }
            
            return channels;
        }

        // Kanalları render et
        function renderChannels() {
            channelsContainer.innerHTML = '';
            
            // Kanal gruplarını bul
            const groups = [...new Set(channels.map(channel => channel.group))];
            
            groups.forEach(group => {
                if (group) {
                    const categoryDiv = document.createElement('div');
                    categoryDiv.className = 'channel-category';
                    
                    const categoryTitle = document.createElement('div');
                    categoryTitle.className = 'category-title';
                    categoryTitle.textContent = group;
                    categoryDiv.appendChild(categoryTitle);
                    
                    const channelList = document.createElement('ul');
                    channelList.className = 'channel-list';
                    
                    // Bu gruba ait kanalları ekle
                    channels
                        .filter(channel => channel.group === group)
                        .forEach(channel => {
                            const channelItem = document.createElement('li');
                            channelItem.className = 'channel-item';
                            channelItem.tabIndex = 0; // TV Box'ta klavye navigasyonu için
                            
                            const logoUrl = channel.logo || 'https://via.placeholder.com/50x50/111/fff?text=TV';
                            
                            channelItem.innerHTML = `
                                <img class="channel-logo" src="${logoUrl}" alt="${channel.name}" onerror="this.onerror=null; this.src='https://via.placeholder.com/50x50/111/fff?text=TV'">
                                <div class="channel-info">
                                    <div class="channel-name">${channel.name}</div>
                                    <div class="channel-group">${channel.group}</div>
                                </div>
                            `;
                            
                            channelItem.addEventListener('click', () => {
                                playChannel(channel);
                                closeSidebarFunc();
                            });
                            
                            // TV Box için klavye navigasyonu
                            channelItem.addEventListener('keydown', (e) => {
                                if (e.key === 'Enter' || e.key === ' ') {
                                    playChannel(channel);
                                    closeSidebarFunc();
                                }
                            });
                            
                            channelList.appendChild(channelItem);
                        });
                    
                    categoryDiv.appendChild(channelList);
                    channelsContainer.appendChild(categoryDiv);
                }
            });
        }

        // Kanal oynat
        function playChannel(channel) {
            showLoading();
            
            currentChannel = channel;
            videoPlayer.src = channel.url;
            
            // Görsel bilgileri güncelle
            const logoUrl = channel.logo || 'https://via.placeholder.com/40x40/111/fff?text=TV';
            currentChannelLogo.src = logoUrl;
            currentChannelLogo.onerror = function() {
                this.src = 'https://via.placeholder.com/40x40/111/fff?text=TV';
            };
            
            currentChannelName.textContent = channel.name;
            
            // Aktif kanalı işaretle
            document.querySelectorAll('.channel-item').forEach(item => {
                item.classList.remove('active');
            });
            
            // Kanalı oynat
            videoPlayer.load();
            
            videoPlayer.play().then(() => {
                hideLoading();
            }).catch(e => {
                console.log("Video oynatma hatası:", e);
                hideLoading();
                // Hata durumunda kullanıcıya bilgi ver
                currentChannelName.textContent = `${channel.name} (Yükleniyor...)`;
            });
        }

        // Sidebar'ı aç
        function openSidebar() {
            channelsSidebar.classList.add('open');
            sidebarOpen = true;
            // İlk kanala odaklan (TV Box navigasyonu için)
            setTimeout(() => {
                const firstChannel = document.querySelector('.channel-item');
                if (firstChannel) firstChannel.focus();
            }, 100);
        }

        // Sidebar'ı kapat
        function closeSidebarFunc() {
            channelsSidebar.classList.remove('open');
            sidebarOpen = false;
            // Menü butonuna odaklan (TV Box navigasyonu için)
            menuButton.focus();
        }

        // Sidebar aç/kapa
        function toggleSidebar() {
            if (sidebarOpen) {
                closeSidebarFunc();
            } else {
                openSidebar();
            }
        }

        // Yükleme göster
        function showLoading() {
            loadingIndicator.classList.add('show');
        }

        // Yükleme gizle
        function hideLoading() {
            loadingIndicator.classList.remove('show');
        }

        // Tam ekran yap
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Tam ekran hatası: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // Ses kontrolü
        function increaseVolume() {
            if (videoPlayer.volume < 1) {
                videoPlayer.volume = Math.min(videoPlayer.volume + 0.1, 1);
            }
        }

        function decreaseVolume() {
            if (videoPlayer.volume > 0) {
                videoPlayer.volume = Math.max(videoPlayer.volume - 0.1, 0);
            }
        }

        // Bilgi göster
        function showInfo() {
            if (currentChannel) {
                alert(`Kanal: ${currentChannel.name}\nGrup: ${currentChannel.group}\nURL: ${currentChannel.url}`);
            } else {
                alert("Henüz bir kanal seçilmedi.");
            }
        }

        // TV Box Klavye Kontrolleri
        document.addEventListener('keydown', (e) => {
            // Menü tuşu (M veya Escape) - TV Box'ta genellikle menü tuşu
            if (e.key === 'm' || e.key === 'M' || e.key === 'Escape') {
                toggleSidebar();
                e.preventDefault();
            }
            
            // Tam ekran (F)
            if (e.key === 'f' || e.key === 'F') {
                toggleFullscreen();
                e.preventDefault();
            }
            
            // Ses kontrolü (+/-)
            if (e.key === '+' || e.key === 'VolumeUp') {
                increaseVolume();
                e.preventDefault();
            }
            
            if (e.key === '-' || e.key === 'VolumeDown') {
                decreaseVolume();
                e.preventDefault();
            }
            
            // Bilgi (I)
            if (e.key === 'i' || e.key === 'I') {
                showInfo();
                e.preventDefault();
            }
            
            // Sidebar içinde ok tuşları ile navigasyon
            if (sidebarOpen) {
                const focused = document.activeElement;
                if (focused.classList.contains('channel-item')) {
                    if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        const prev = focused.previousElementSibling || 
                                   focused.parentElement.previousElementSibling?.lastElementChild;
                        if (prev && prev.classList.contains('channel-item')) {
                            prev.focus();
                        }
                    } else if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        const next = focused.nextElementSibling || 
                                   focused.parentElement.nextElementSibling?.firstElementChild;
                        if (next && next.classList.contains('channel-item')) {
                            next.focus();
                        }
                    }
                }
            }
        });

        // Başlangıç işlemleri
        function init() {
            // M3U verisini parse et
            channels = parseM3U(m3uData);
            
            // Kanalları render et
            renderChannels();
            
            // TRT 1'i varsayılan olarak oynat
            const trt1 = channels.find(ch => ch.name.includes('TRT 1') && !ch.name.includes('FURKAN'));
            if (trt1) {
                setTimeout(() => playChannel(trt1), 1000);
            }
            
            // Event listener'ları ekle
            menuButton.addEventListener('click', toggleSidebar);
            closeSidebar.addEventListener('click', closeSidebarFunc);
            fullscreenButton.addEventListener('click', toggleFullscreen);
            volumeUpButton.addEventListener('click', increaseVolume);
            volumeDownButton.addEventListener('click', decreaseVolume);
            infoButton.addEventListener('click', showInfo);
            
            // Video olayları
            videoPlayer.addEventListener('waiting', showLoading);
            videoPlayer.addEventListener('playing', hideLoading);
            videoPlayer.addEventListener('error', hideLoading);
            
            // TV Box için ilk odak noktası
            menuButton.focus();
        }

        // Sayfa yüklendiğinde başlat
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
